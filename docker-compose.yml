version: '3.8'

services:
  db:
    image: ankane/pgvector:latest  # Postgres con soporte para IA (vectores)
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: santiago
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: brain_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: